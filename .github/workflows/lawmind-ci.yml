# Core LawMind checks: unit tests, desktop server bundle, renderer typecheck.
name: LawMind CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: lawmind-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install

      - name: Test (LawMind + desktop packages)
        run: pnpm test

      - name: Bundle local API (esbuild)
        run: pnpm lawmind:bundle:desktop-server

      - name: Typecheck LawMind desktop renderer
        run: pnpm --filter lawmind-desktop typecheck
