name: Bug report
description: Report defects, including regressions, crashes, and behavior bugs.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing this report. Keep it concise, reproducible, and evidence-based.
  - type: dropdown
    id: bug_type
    attributes:
      label: Bug type
      description: Choose the category that best matches this report.
      options:
        - Regression (worked before, now fails)
        - Crash (process/app exits or hangs)
        - Behavior bug (incorrect output/state without crash)
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence statement of what is broken.
      placeholder: After upgrading to <version>, chat / task / export regressed from <prior version>.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Provide the shortest deterministic repro path.
      placeholder: |
        1. Open LawMind desktop; pick workspace.
        2. Create matter / task with instruction X.
        3. Observe error Y.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen if the bug does not exist.
      placeholder: Draft appears in review workbench; local server returns 200 from /api/chat.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead, including user-visible errors.
      placeholder: No assistant reply; DevTools console or local server log shows error "...". 
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LawMind version
      description: Desktop app version (menu → About) or workspace `package.json` version when running from source.
      placeholder: e.g. 0.1.0 / git sha
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: OS and version where this occurs.
      placeholder: macOS 15.4 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: input
    id: install_method
    attributes:
      label: Install method
      description: Packaged .dmg/.exe, or dev (`pnpm lawmind:desktop`).
      placeholder: packaged dmg / pnpm dev
  - type: input
    id: model
    attributes:
      label: Model
      description: Effective model under test.
      placeholder: minimax/text-01 / openrouter/anthropic/claude-opus-4.1 / anthropic/claude-sonnet-4.5
    validations:
      required: true
  - type: input
    id: provider_chain
    attributes:
      label: Model routing (optional)
      description: How the chat model is reached (OpenAI-compatible base URL, proxy, or router). Redact secrets.
      placeholder: base URL → provider
  - type: input
    id: config_location
    attributes:
      label: Config file / key location
      description: Optional. Relevant config source or key path if this bug depends on overrides or custom provider setup. Redact secrets.
      placeholder: ~/Library/Application Support/LawMind/LawMind/.env.lawmind ; LAWMIND_REPO_ROOT when using dev shell
  - type: textarea
    id: provider_setup_details
    attributes:
      label: Additional provider/model setup details
      description: Optional. Include redacted routing details, per-agent overrides, auth-profile interactions, env/config context, or anything else needed to explain the effective provider/model setup. Do not include API keys, tokens, or passwords.
      placeholder: |
        Example: base URL is https://api.example.com/v1; model id is gpt-4o.
        Relevant env is in LawMind userData `.env.lawmind` (path redacted).
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, and evidence
      description: Include redacted logs/screenshots/recordings that prove the behavior.
      render: shell
  - type: textarea
    id: impact
    attributes:
      label: Impact and severity
      description: |
        Explain who is affected, how severe it is, how often it happens, and the practical consequence.
        Include:
        - Affected users/systems/channels
        - Severity (annoying, blocks workflow, data risk, etc.)
        - Frequency (always/intermittent/edge case)
        - Consequence (missed messages, failed onboarding, extra cost, etc.)
      placeholder: |
        Affected: LawMind desktop on macOS 15
        Severity: blocks drafting workflow
        Frequency: 100% repro
        Consequence: local server returns 500 on /api/chat
  - type: textarea
    id: additional_information
    attributes:
      label: Additional information
      description: Add any context that helps triage but does not fit above. If this is a regression, include the last known good and first known bad versions.
      placeholder: Last known good version <...>, first known bad version <...>, temporary workaround is ...
